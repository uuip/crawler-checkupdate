[package]
name = "rule"
version = "0.1.0"
edition = "2021"

[dependencies]
reqwest = { version = "0.12.7", features = ["json", "gzip"] }
regex = "1.10.6"
serde_json = "1.0.128"
anyhow = "1.0.88"
once_cell = "1.19.0"
scraper = "0.20.0"
semver = "1.0.23"
models = { path = "../models" }
roxmltree = { version = "0.20.0"}
chrono = { version = "0.4.38", default-features = false, features = ["std", "clock", "serde"] }
chrono-tz = "0.10.0"
